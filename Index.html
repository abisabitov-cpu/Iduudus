<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildShare</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

header{
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

main{
    background:white;
    color:#333;
    border-radius:25px 25px 0 0;
    padding:20px;
    min-height:100vh;
}

input,textarea,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #ddd;
}

button{
    background:#667eea;
    color:white;
    border:none;
    font-weight:bold;
}

button:active{ transform:scale(0.97); }

.tabs button{
    background:#eee;
    color:#333;
}

.tabs button.active{
    background:#667eea;
    color:white;
}

.card{
    background:#f9f9f9;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

img{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}

.hidden{ display:none; }

.like{ color:red; font-weight:bold; }

.closeBtn{
    background:#ff4d4d;
}
.deleteBtn{
    background:#444;
    margin-top:5px;
}
</style>
</head>

<body>

<header>BuildShare 🧩</header>

<main>

<div id="auth">
<h2>Вход</h2>
<input id="username" placeholder="Введите имя">
<button onclick="login()">Войти</button>
</div>

<div id="app" class="hidden">

<h3 id="welcome"></h3>
<button onclick="logout()">Выйти</button>

<div class="tabs">
<button onclick="showTab('create')" id="createBtn">Создать</button>
<button onclick="showTab('my')" id="myBtn">Мои</button>
<button onclick="showTab('all')" id="allBtn">Все</button>
</div>

<!-- CREATE -->
<div id="createTab">
<input id="title" placeholder="Название инструкции">
<textarea id="stepText" placeholder="Описание шага"></textarea>
<input type="file" id="imageInput" accept="image/*">
<button onclick="addStep()">Добавить шаг</button>
<button onclick="publish()">Опубликовать</button>
<div id="preview"></div>
</div>

<!-- MY -->
<div id="myTab" class="hidden">
<div id="myList"></div>
</div>

<!-- ALL -->
<div id="allTab" class="hidden">
<div id="allList"></div>
</div>

<!-- VIEW -->
<div id="view" class="hidden">
<button class="closeBtn" onclick="closeView()">Закрыть</button>
<div id="viewContent"></div>
</div>

</div>

</main>

<script>
let currentUser=localStorage.getItem("user");
let steps=[];

if(currentUser) startApp();

function login(){
    let name=document.getElementById("username").value.trim();
    if(!name) return;
    localStorage.setItem("user",name);
    currentUser=name;
    startApp();
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}

function startApp(){
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("welcome").innerText="Привет, "+currentUser+" 👋";
    load();
}

function showTab(tab){
    document.getElementById("createTab").classList.add("hidden");
    document.getElementById("myTab").classList.add("hidden");
    document.getElementById("allTab").classList.add("hidden");

    document.getElementById(tab+"Tab").classList.remove("hidden");
    closeView();
}

function addStep(){
    let text=document.getElementById("stepText").value;
    let file=document.getElementById("imageInput").files[0];
    if(!text && !file) return;

    if(file){
        let reader=new FileReader();
        reader.onload=e=>{
            steps.push({text,image:e.target.result});
            showPreview();
        }
        reader.readAsDataURL(file);
    }else{
        steps.push({text,image:null});
        showPreview();
    }

    document.getElementById("stepText").value="";
    document.getElementById("imageInput").value="";
}

function showPreview(){
    let p=document.getElementById("preview");
    p.innerHTML="";
    steps.forEach((s,i)=>{
        p.innerHTML+=`
        <div class="card">
        <b>Шаг ${i+1}</b>
        <p>${s.text||""}</p>
        ${s.image?`<img src="${s.image}">`:""}
        </div>`;
    });
}

function publish(){
    let title=document.getElementById("title").value;
    if(!title||steps.length==0) return;

    let data=JSON.parse(localStorage.getItem("data")||"[]");
    data.push({title,author:currentUser,steps,likes:0});
    localStorage.setItem("data",JSON.stringify(data));

    steps=[];
    document.getElementById("preview").innerHTML="";
    document.getElementById("title").value="";
    load();
}

function load(){
    let data=JSON.parse(localStorage.getItem("data")||"[]");
    let my=document.getElementById("myList");
    let all=document.getElementById("allList");
    my.innerHTML="";
    all.innerHTML="";

    data.forEach((d,i)=>{
        let card=`
        <div class="card">
        <b>${d.title}</b><br>
        Автор: ${d.author}<br>
        ❤️ <span class="like">${d.likes}</span>
        <button onclick="view(${i})">Открыть</button>
        <button onclick="like(${i})">Лайк</button>
        ${d.author===currentUser?`<button class="deleteBtn" onclick="del(${i})">Удалить</button>`:""}
        </div>`;
        all.innerHTML+=card;
        if(d.author===currentUser) my.innerHTML+=card;
    });
}

function view(i){
    let data=JSON.parse(localStorage.getItem("data")||"[]");
    let d=data[i];
    document.getElementById("view").classList.remove("hidden");
    let v=document.getElementById("viewContent");
    v.innerHTML=`<h2>${d.title}</h2>Автор: ${d.author}`;
    d.steps.forEach((s,n)=>{
        v.innerHTML+=`
        <div class="card">
        <b>Шаг ${n+1}</b>
        <p>${s.text||""}</p>
        ${s.image?`<img src="${s.image}">`:""}
        </div>`;
    });
}

function closeView(){
    document.getElementById("view").classList.add("hidden");
    document.getElementById("viewContent").innerHTML="";
}

function like(i){
    let data=JSON.parse(localStorage.getItem("data")||"[]");
    data[i].likes++;
    localStorage.setItem("data",JSON.stringify(data));
    load();
}

function del(i){
    let data=JSON.parse(localStorage.getItem("data")||"[]");
    data.splice(i,1);
    localStorage.setItem("data",JSON.stringify(data));
    load();
}
</script>

</body>
</html>
